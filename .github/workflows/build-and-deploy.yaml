name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - src/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - drizzle.config.ts
      - Dockerfile
      - .dockerignore
      - k8s/**
      - .github/workflows/build-and-deploy.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image, push, bump values tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Build and push image
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="romainecr.azurecr.io/auth:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Bump image tag in k8s/values.yaml
        run: sed -i "s|^  tag: .*|  tag: ${{ env.TAG }}|" k8s/values.yaml

      - name: Commit and push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          if git diff --cached --quiet; then
            echo "No values changes to commit"
            exit 0
          fi
          git commit -m "chore: bump auth image to ${{ env.TAG }} [skip ci]"
          git push
