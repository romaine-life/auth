{{- if .Values.wildcardCertificate.enabled -}}
# Wildcard cert covering auth.dev.romaine.life and every per-install
# hostname under *.auth.dev.romaine.life. Issued via DNS-01 (HTTP-01
# cannot do wildcards). The resulting Secret backs the wildcard
# XListenerSet in this same namespace; per-install helm releases from
# k8s/issue/ attach their HTTPRoute to that listener instead of
# provisioning their own cert and listener.
#
# Mirrors glimmung's wildcard cert pattern so glimmung's test-slot
# reconciler can transplant onto this project with no per-app surgery.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.wildcardCertificate.tlsSecret }}
  namespace: auth
spec:
  secretName: {{ .Values.wildcardCertificate.tlsSecret }}
  issuerRef:
    name: {{ .Values.wildcardCertificate.issuer }}
    kind: ClusterIssuer
  dnsNames:
    {{- range .Values.wildcardCertificate.hosts }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
