# CloudNativePG Postgres cluster for the auth service.
# Operator is installed cluster-wide via infra-bootstrap's
# k8s/apps/cloudnative-pg.yaml; here we just declare a Cluster CR and it
# reconciles a Pod + PVC + auto-generated Secrets (`auth-db-app`, `auth-db-ca`, etc.).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-db
  namespace: auth
spec:
  instances: 1
  storage:
    size: 5Gi
    # Dedicated StorageClass with reclaimPolicy: Retain (see
    # templates/storageclass.yaml). Survives accidental PVC delete or
    # ArgoCD prune — the underlying Azure Disk persists and can be
    # re-bound. The existing pre-PR PV needs an in-place reclaim
    # policy patch since storageClass is immutable on a Bound PVC;
    # this only governs NEW PVCs that CNPG provisions (i.e., when a
    # new instance joins the cluster, including the standby that
    # arrives with the HA bump).
    storageClass: auth-db-retain
  # `bootstrap.initdb.database` becomes the default DB and `owner` becomes the
  # role that owns it; the generated `auth-db-app` Secret has the matching
  # connection URI ready for the app to consume.
  bootstrap:
    initdb:
      database: auth
      owner: auth
  # Resource requests are modest — the auth workload is tiny, but Postgres
  # wants enough memory for shared_buffers + connection overhead.
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Continuous WAL archiving + base backup to Azure Blob. The
  # ScheduledBackup CR (templates/scheduledbackup.yaml) drives the
  # periodic base backups; CNPG streams WAL between backups so a
  # restore can hit any point in time within the retention window.
  #
  # azureCredentials.connectionString resolves via the Secret
  # provisioned by templates/externalsecret-cnpg-backups.yaml, which
  # mirrors a KV entry that tofu/backups.tf writes alongside the
  # storage account itself.
  #
  # Migration note (future hardening): swap connectionString for
  # inheritFromAzureAD with a federated UAMI. Requires:
  #   - UAMI provisioned in tofu with Storage Blob Data Contributor
  #     on this container only
  #   - Federated credential on subject
  #     system:serviceaccount:auth:auth-db
  #   - serviceAccountTemplate.metadata.annotations on this Cluster
  #     with azure.workload.identity/client-id
  # Out of scope for v1 because the account is single-purpose and the
  # connection string never leaves cluster + KV.
  backup:
    barmanObjectStore:
      destinationPath: "https://{{ .Values.backups.storageAccount }}.blob.core.windows.net/{{ .Values.backups.container }}/"
      azureCredentials:
        connectionString:
          name: auth-db-backup-storage
          key: connection-string
      wal:
        compression: gzip
      data:
        compression: gzip
    # 30 days of base backups + WAL. CNPG prunes anything older when
    # the next backup completes.
    retentionPolicy: "30d"
