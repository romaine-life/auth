# CloudNativePG Postgres cluster for the auth service.
# Operator is installed cluster-wide via infra-bootstrap's
# k8s/apps/cloudnative-pg.yaml; here we just declare a Cluster CR and it
# reconciles a Pod + PVC + auto-generated Secrets (`auth-db-app`, `auth-db-ca`, etc.).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-db
  namespace: auth
spec:
  instances: 1
  storage:
    size: 5Gi
    # Dedicated StorageClass with reclaimPolicy: Retain (see
    # templates/storageclass.yaml). Survives accidental PVC delete or
    # ArgoCD prune — the underlying Azure Disk persists and can be
    # re-bound. The existing pre-PR PV needs an in-place reclaim
    # policy patch since storageClass is immutable on a Bound PVC;
    # this only governs NEW PVCs that CNPG provisions (i.e., when a
    # new instance joins the cluster, including the standby that
    # arrives with the HA bump).
    storageClass: auth-db-retain
  # `bootstrap.initdb.database` becomes the default DB and `owner` becomes the
  # role that owns it; the generated `auth-db-app` Secret has the matching
  # connection URI ready for the app to consume.
  bootstrap:
    initdb:
      database: auth
      owner: auth
  # Resource requests are modest — the auth workload is tiny, but Postgres
  # wants enough memory for shared_buffers + connection overhead.
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
