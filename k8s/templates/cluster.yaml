# CloudNativePG Postgres cluster for the auth service.
# Operator is installed cluster-wide via infra-bootstrap's
# k8s/apps/cloudnative-pg.yaml; here we just declare a Cluster CR and it
# reconciles a Pod + PVC + auto-generated Secrets (`auth-db-app`, `auth-db-ca`, etc.).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-db
  namespace: auth
spec:
  # 2 instances enables CNPG's automatic failover. During AKS node
  # drain, CNPG detects the primary's node going unschedulable, runs
  # a switchover to the standby (label flip
  # cnpg.io/instanceRole: primary -> replica), and the eviction API
  # can satisfy the primary PDB against the new pod. Service rw
  # endpoint redirects automatically; downtime is single-digit seconds
  # rather than the 1-3 minutes a single-instance restart takes.
  #
  # primaryUpdateStrategy: unsupervised (default) means CNPG performs
  # this switchover without human approval.
  #
  # Replica streams WAL from the primary via synchronous=any-1
  # replication by default. Better Auth's writes are small and
  # infrequent so the replication lag is negligible.
  instances: 2
  storage:
    size: 5Gi
    # Dedicated StorageClass with reclaimPolicy: Retain (see
    # templates/storageclass.yaml). Survives accidental PVC delete or
    # ArgoCD prune — the underlying Azure Disk persists and can be
    # re-bound. The existing pre-PR PV needs an in-place reclaim
    # policy patch since storageClass is immutable on a Bound PVC;
    # this only governs NEW PVCs that CNPG provisions (i.e., when a
    # new instance joins the cluster, including the standby that
    # arrives with the HA bump).
    storageClass: auth-db-retain
  # `bootstrap.initdb.database` becomes the default DB and `owner` becomes the
  # role that owns it; the generated `auth-db-app` Secret has the matching
  # connection URI ready for the app to consume.
  bootstrap:
    initdb:
      database: auth
      owner: auth
  # Resource requests are modest — the auth workload is tiny, but Postgres
  # wants enough memory for shared_buffers + connection overhead.
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Workload-identity annotations on the CNPG-managed ServiceAccount.
  # The azwi webhook reads `azure.workload.identity/client-id` from the
  # SA at pod-creation time and projects a federated token at
  # /var/run/secrets/azure/tokens/azure-identity-token. CNPG's
  # `inheritFromAzureAD: true` (below) then uses DefaultAzureCredential,
  # which finds the projected token and exchanges it for a Storage
  # access token bound to the UAMI in tofu/workload-identity.tf.
  serviceAccountTemplate:
    metadata:
      annotations:
        azure.workload.identity/client-id: {{ .Values.backups.workloadIdentityClientId | quote }}
  # Pod-level label the azwi mutating webhook keys on to project the
  # SA token volume. CNPG's inheritedMetadata applies the label to
  # every pod the Cluster owns (primary + standbys).
  inheritedMetadata:
    labels:
      azure.workload.identity/use: "true"
  # Continuous WAL archiving + base backup to Azure Blob. The
  # ScheduledBackup CR (templates/scheduledbackup.yaml) drives the
  # periodic base backups; CNPG streams WAL between backups so a
  # restore can hit any point in time within the retention window.
  #
  # azureCredentials.inheritFromAzureAD resolves via the projected SA
  # token + DefaultAzureCredential. The connection-string flow (and the
  # ExternalSecret/k8s Secret/KV entry that backed it) was removed in
  # this PR per docs/migration-policy.md — no parallel auth paths.
  backup:
    barmanObjectStore:
      destinationPath: "https://{{ .Values.backups.storageAccount }}.blob.core.windows.net/{{ .Values.backups.container }}/"
      azureCredentials:
        inheritFromAzureAD: true
      wal:
        compression: gzip
      data:
        compression: gzip
    # 30 days of base backups + WAL. CNPG prunes anything older when
    # the next backup completes.
    retentionPolicy: "30d"
