# Dual parentRef: XListenerSet for HTTPS serving, Gateway main for HTTP (and
# so ExternalDNS creates the A record — external-dns#5694 tracks native
# XListenerSet source support).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth
  namespace: auth
spec:
  hostnames:
    - auth.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: auth
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: auth
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
