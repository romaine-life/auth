apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: auth
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: auth
      containers:
        - name: auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: BASE_URL
              value: https://auth.romaine.life
            # CNPG-managed: `auth-db-app` Secret is created automatically by the
            # operator from cluster.yaml and rotated when the cluster is recreated.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-db-app
                  key: uri
            # ExternalSecret syncs these from ng6-auth -> `auth-oauth` Secret.
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: MICROSOFT_CLIENT_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: GOOGLE_CLIENT_SECRET
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: BETTER_AUTH_SECRET
            # OIDC provider plugin (src/auth.ts) — client_secret for the
            # Grafana relying party at grafana.romaine.life. KV-managed via
            # the ExternalSecret in externalsecret.yaml; rotate by setting
            # `grafana-oidc-client-secret` in ng6-auth and re-rolling
            # both this pod and the Grafana pod (Grafana's matching
            # value lives in ng6-osms).
            - name: OIDC_GRAFANA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: OIDC_GRAFANA_CLIENT_SECRET
            # Glimmung-managed slot origin admin surface
            # (/api/admin/origins/*). Inbound auth: k8s SA tokens signed by
            # the cluster OIDC issuer below, with audience = this service.
            # See nelsong6/glimmung#142.
            - name: K8S_OIDC_ISSUER
              value: {{ .Values.k8sOidc.issuer | quote }}
            - name: K8S_ADMIN_AUDIENCE
              value: {{ .Values.k8sOidc.adminAudience | quote }}
            - name: K8S_ADMIN_SA_ALLOWLIST
              value: {{ .Values.k8sOidc.adminSaAllowlist | quote }}
            # Service-principal exchange (/api/auth/exchange/k8s). Inbound
            # SA tokens from session pods (today: tank-operator) trade for
            # an auth.romaine.life JWT with role=service. Separate audience
            # + allowlist from the admin path so an admin token cannot be
            # replayed as a service principal and vice versa. See
            # nelsong6/tank-operator#486.
            - name: K8S_SERVICE_AUDIENCE
              value: {{ .Values.k8sOidc.serviceAudience | quote }}
            - name: K8S_SERVICE_SA_ALLOWLIST
              value: {{ .Values.k8sOidc.serviceSaAllowlist | quote }}
            # External-audience federation exchange
            # (/api/auth/exchange/federation). Workloads here mint
            # auth.romaine.life-signed JWTs scoped to a third-party
            # IdP's audience (today: Tailscale). Distinct allowlist
            # from K8S_SERVICE_SA_ALLOWLIST — different security
            # context, different audience surface. See
            # src/federation-exchange.ts header.
            - name: K8S_FEDERATION_AUDIENCE
              value: {{ .Values.k8sOidc.federationAudience | quote }}
            - name: K8S_FEDERATION_SA_ALLOWLIST
              value: {{ .Values.k8sOidc.federationSaAllowlist | quote }}
            - name: FEDERATION_AUDIENCE_ALLOWLIST
              value: {{ .Values.k8sOidc.federationAudienceAllowlist | quote }}
            # SSH user-certificate exchange (/api/auth/exchange/ssh-cert).
            # auth owns the SSH CA key (migration that retired glimmung's
            # local signer) and signs short-lived OpenSSH user certs. The CA
            # private key is PKCS#8 PEM ed25519, synced from ng6-auth KV
            # (`auth-ssh-ca-private-key`) via the ExternalSecret. Distinct
            # allowlist from the federation/service paths — minting a host
            # login credential is a separate trust decision. See
            # src/ssh-cert-exchange.ts.
            - name: SSH_CA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: SSH_CA_PRIVATE_KEY
            - name: K8S_SSH_CERT_AUDIENCE
              value: {{ .Values.k8sOidc.sshCertAudience | quote }}
            - name: K8S_SSH_CERT_SA_ALLOWLIST
              value: {{ .Values.k8sOidc.sshCertSaAllowlist | quote }}
            - name: SSH_CERT_PRINCIPAL_PATTERN
              value: {{ .Values.k8sOidc.sshCertPrincipalPattern | quote }}
            # Trust the in-cluster CA so native fetch's TLS validates the
            # apiserver cert when src/k8s-pod.ts calls
            # https://kubernetes.default.svc. Avoids pulling in undici
            # for a per-request Agent. The file is mounted automatically
            # via the default ServiceAccount token projection.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
