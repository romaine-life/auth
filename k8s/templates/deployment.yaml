apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: auth
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: auth
      containers:
        - name: auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: BASE_URL
              value: https://auth.romaine.life
            # CNPG-managed: `auth-db-app` Secret is created automatically by the
            # operator from cluster.yaml and rotated when the cluster is recreated.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-db-app
                  key: uri
            # ExternalSecret syncs these from romaine-kv → `auth-oauth` Secret.
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: MICROSOFT_CLIENT_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: GOOGLE_CLIENT_SECRET
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-oauth
                  key: BETTER_AUTH_SECRET
            # Glimmung-managed slot origin admin surface
            # (/api/admin/origins/*). Inbound auth: k8s SA tokens signed by
            # the cluster OIDC issuer below, with audience = this service.
            # See nelsong6/glimmung#142.
            - name: K8S_OIDC_ISSUER
              value: {{ .Values.k8sOidc.issuer | quote }}
            - name: K8S_ADMIN_AUDIENCE
              value: {{ .Values.k8sOidc.adminAudience | quote }}
            - name: K8S_ADMIN_SA_ALLOWLIST
              value: {{ .Values.k8sOidc.adminSaAllowlist | quote }}
            # Service-principal exchange (/api/auth/exchange/k8s). Inbound
            # SA tokens from session pods (today: tank-operator) trade for
            # an auth.romaine.life JWT with role=service. Separate audience
            # + allowlist from the admin path so an admin token cannot be
            # replayed as a service principal and vice versa. See
            # nelsong6/tank-operator#486.
            - name: K8S_SERVICE_AUDIENCE
              value: {{ .Values.k8sOidc.serviceAudience | quote }}
            - name: K8S_SERVICE_SA_ALLOWLIST
              value: {{ .Values.k8sOidc.serviceSaAllowlist | quote }}
            # Entra ID exchange (/api/auth/entra-exchange). Programmatic
            # alternative to the cookie-based silent-exchange path: a CLI
            # caller POSTs the access token sitting in their `az` session
            # and gets back the same human-shape JWT. Tenant + audience are
            # pinned per-environment so a token issued for any other Entra
            # resource cannot be replayed here.
            {{- if .Values.entraExchange.audience }}
            - name: ENTRA_EXCHANGE_AUDIENCE
              value: {{ .Values.entraExchange.audience | quote }}
            - name: ENTRA_EXCHANGE_TENANT_ID
              value: {{ .Values.entraExchange.tenantId | quote }}
            {{- end }}
            # Trust the in-cluster CA so native fetch's TLS validates the
            # apiserver cert when src/k8s-pod.ts calls
            # https://kubernetes.default.svc. Avoids pulling in undici
            # for a per-request Agent. The file is mounted automatically
            # via the default ServiceAccount token projection.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
