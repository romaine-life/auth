# Syncs OAuth client credentials + the Better Auth signing secret from
# romaine-kv into a k8s Secret named `auth-oauth`, mounted as env in
# deployment.yaml. Source-of-truth lives in Key Vault; this controller
# (external-secrets-operator) refreshes the k8s Secret on a 1h cadence.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-oauth
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: auth-oauth
    creationPolicy: Owner
  data:
    - secretKey: MICROSOFT_CLIENT_ID
      remoteRef:
        key: microsoft-oauth-client-id
    - secretKey: MICROSOFT_CLIENT_SECRET
      remoteRef:
        key: microsoft-oauth-client-secret
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: google-oauth-client-id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: google-oauth-client-secret
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: auth-better-auth-secret
