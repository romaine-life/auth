# Syncs OAuth client credentials + the Better Auth signing secret from
# Key Vault into a k8s Secret named `auth-oauth`, mounted as env in
# deployment.yaml. Source-of-truth lives in Key Vault; this controller
# (external-secrets-operator) refreshes the k8s Secret on a 1h cadence.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-oauth
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName | quote }}
    kind: {{ .Values.externalSecret.storeKind | quote }}
  target:
    name: auth-oauth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: MICROSOFT_CLIENT_ID
      remoteRef:
        key: microsoft-oauth-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: MICROSOFT_CLIENT_SECRET
      remoteRef:
        key: microsoft-oauth-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: google-oauth-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: google-oauth-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: auth-better-auth-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    # OIDC provider plugin (src/auth.ts) — Grafana relying party.
    # The matching half (used by Grafana to authenticate to /oauth2/token)
    # is in osms's grafana-oauth ExternalSecret. Rotate both together.
    - secretKey: OIDC_GRAFANA_CLIENT_SECRET
      remoteRef:
        key: grafana-oidc-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    # OIDC provider plugin (src/auth.ts) — Argo CD relying party (via Dex).
    # Argo CD reads the matching half from this same ng6-auth secret through
    # the cluster-scoped ng6-auth ClusterSecretStore (see infra-bootstrap
    # k8s/argocd/argocd-dex-romaine-externalsecret.yaml). Rotate both together.
    - secretKey: OIDC_ARGOCD_CLIENT_SECRET
      remoteRef:
        key: argocd-shared-oidc-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    # SSH user-certificate signing CA (POST /api/auth/exchange/ssh-cert).
    # PKCS#8 PEM ed25519 private key. auth is the sole owner of this key
    # after the migration that retired glimmung's local SSH CA. Generate +
    # publish to KV once (see k8s/values.yaml `sshCert` notes); the public
    # half is served at GET /api/ssh/ca for host TrustedUserCAKeys. Rotate
    # by setting a new `auth-ssh-ca-private-key` in ng6-auth, re-rolling
    # this pod, and re-trusting the new public key on every host.
    - secretKey: SSH_CA_PRIVATE_KEY
      remoteRef:
        key: auth-ssh-ca-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
