{{- /*
Pulls the storage-account connection string for CNPG backups from
Key Vault into a Kubernetes Secret that the auth-db Cluster
references via .spec.backup.barmanObjectStore.azureCredentials.
The KV secret is provisioned by tofu/backups.tf.

CNPG expects the connection string under a specific Secret key
("connection-string" by convention). The external-secrets-operator
refresh interval is short (1m) so a tofu-driven KV rotation
propagates fast.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-db-backup-storage
  namespace: auth
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: auth-db-backup-storage
    creationPolicy: Owner
  data:
    - secretKey: connection-string
      remoteRef:
        key: auth-db-backup-storage-connection
