{{- /*
Dedicated StorageClass for the auth-db Postgres cluster with
reclaimPolicy: Retain. The default StorageClass in AKS uses
reclaimPolicy: Delete, which destroys the underlying Azure Disk
whenever its PVC is deleted — a single `kubectl delete pvc` typo or
a misconfigured ArgoCD prune would wipe every user's auth data.

`Retain` keeps the disk after PVC deletion (it becomes a Released
PV that can be re-bound), so accidental loss requires actively
deleting the underlying disk in Azure, not just a Kubernetes object.

WaitForFirstConsumer ensures the disk lands in the same zone as the
pod that ends up using it; the cluster is single-zone today but the
binding mode is the right default if it ever expands.
*/}}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: auth-db-retain
  labels:
    app.kubernetes.io/name: auth-db
    app.kubernetes.io/component: storage
provisioner: disk.csi.azure.com
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  skuName: StandardSSD_LRS
