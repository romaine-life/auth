{{- if not .Values.image.tag -}}
{{- fail "image.tag is required (the per-install image tag built by the validation workflow)" -}}
{{- end -}}
{{- if not .Values.hostname -}}
{{- fail "hostname is required (e.g. auth-slot-1.auth.dev.romaine.life)" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: auth-issue
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- if .Values.prNumber }}
    auth.io/pr: {{ .Values.prNumber | quote }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-issue
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      containers:
        - name: auth
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            # TEST_MODE flips the server into fixture-data mode. Handlers
            # don't touch the DB and don't call Better Auth methods; sign-in
            # just sets a cookie. Slots run only in this mode.
            - name: TEST_MODE
              value: "true"
            # BASE_URL pins the issuer claim and any self-links to the
            # slot's own hostname. Used by the topbar's mock JWKS and the
            # fixture claims.
            - name: BASE_URL
              value: https://{{ .Values.hostname }}
            # COOKIE_DOMAIN scopes the test-mode session cookie so it
            # doesn't leak into prod's .romaine.life cookies.
            - name: COOKIE_DOMAIN
              value: {{ .Values.cookieDomain | quote }}
            # Surface a build identifier so the footer sigil renders the
            # per-install image tag rather than "dev".
            - name: GIT_SHA
              value: {{ .Values.image.tag | quote }}
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
