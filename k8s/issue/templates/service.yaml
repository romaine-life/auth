apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: auth-issue
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- if .Values.prNumber }}
    auth.io/pr: {{ .Values.prNumber | quote }}
    {{- end }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: http
