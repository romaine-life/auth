# Plain ServiceAccount — the auth pod has no direct Azure dependencies
# (DB creds come from the CNPG-managed `auth-db-app` Secret; OAuth secrets
# come from `auth-oauth` via an ExternalSecret that uses the shared identity).
# Switch to workload-identity-annotated later if/when the pod needs to call
# Azure APIs directly.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth
  namespace: auth
