# The image tag is bumped by .github/workflows/build-and-deploy.yaml on every
# push to main (via `sed` on this file). Everything else is wired through
# templates/.
image:
  repository: romainecr.azurecr.io/auth
  # Quoted to force YAML string parsing. An all-numeric short SHA
  # (e.g. 5651694) would otherwise be read as an int, round-tripped
  # through Helm's float-backed value pipeline, and rendered as
  # "5.651694e+06" — which is not a real ACR tag. The bump-and-push
  # step in .github/workflows/build-and-deploy.yaml writes the
  # quoted form for the same reason.
  tag: "77cb2e5"

externalSecret:
  createStore: true
  storeName: ng6-auth
  storeKind: ClusterSecretStore
  vaultUrl: https://ng6-auth.vault.azure.net

# Wildcard cert + XListenerSet covering auth.dev.romaine.life AND
# *.auth.dev.romaine.life. Provisioned once by the prod chart so
# per-slot helm releases (k8s/issue/) can attach their HTTPRoutes to
# this listener instead of each provisioning their own cert + listener.
# Mirrors glimmung's wildcard cert pattern.
wildcardCertificate:
  enabled: true
  name: auth-wildcard
  tlsSecret: auth-wildcard-tls
  issuer: letsencrypt-prod-dns01
  allowedFromNamespaces: All
  hosts:
    - auth.dev.romaine.life
    - "*.auth.dev.romaine.life"

# auth-db backup destination. storageAccount is provisioned by
# tofu/backups.tf and named `authdbbackups<random>`; on first tofu
# apply, copy the value of `terraform output auth_db_backups_storage_account`
# into the field below. container is fixed by tofu and matches.
#
# Empty storageAccount short-circuits the CNPG backup config to a
# render-error (no destinationPath), which is the right failure mode
# while tofu is being applied for the first time — better than a
# silently-misconfigured Cluster that thinks it's backing up but isn't.
backups:
  # Provisioned by tofu/backups.tf — `authdbbackups<random>`. Update
  # this whenever tofu replaces the storage account (rare; happens on
  # delete/re-import only).
  storageAccount: "authdbbackupspjbrsd"
  container: "auth-db"
  # Workload-identity client ID for the auth-db-backup-writer UAMI
  # provisioned in tofu/workload-identity.tf. Copy from
  # `terraform output auth_db_backup_writer_client_id` after the tofu
  # apply that creates the UAMI. The chart's cluster.yaml uses this on
  # the SA annotation azure.workload.identity/client-id; CNPG's
  # inheritFromAzureAD path then picks up the projected token at
  # /var/run/secrets/azure/tokens/azure-identity-token.
  workloadIdentityClientId: "4d3946f7-3845-4cb4-84f7-f6210dda6f01"

# Glimmung-managed slot origin admin surface. Inbound auth on
# /api/admin/origins/* validates a k8s ServiceAccount JWT signed by the
# cluster OIDC issuer below. See nelsong6/glimmung#142.
k8sOidc:
  # AKS OIDC discovery issuer. Same issuer that powers Azure workload
  # identity federation for AKS — the cluster API server signs SA tokens
  # against this OIDC keypair, and Azure-side workload-identity federation
  # already trusts it. Source of truth: any project's
  # `native_standby_workload_identity_status.issuer` field in glimmung.
  issuer: "https://westus2.oic.prod-aks.azure.com/2236b5e4-81d2-4d82-bde5-17b1037999ea/5aced6d5-4299-421b-84a9-6638aebbf4f0/"
  # Audience claim that inbound admin tokens must carry. Glimmung's
  # deployment mounts a projected SA token with this exact audience so
  # that a stolen glimmung token cannot be replayed against any other
  # JWT-validating service in the cluster.
  adminAudience: "https://auth.romaine.life"
  # Allowed (namespace, serviceAccount) callers, comma-separated.
  # Glimmung's deployment runs as `infra-shared` in the `glimmung`
  # namespace (see nelsong6/glimmung k8s/values.yaml: `serviceAccount:
  # infra-shared`).
  adminSaAllowlist: "glimmung/infra-shared"
  # Service-principal exchange (/api/auth/exchange/k8s). Session pods
  # mint a projected SA token with this audience and POST it here to
  # receive an auth.romaine.life JWT with role=service. See
  # nelsong6/tank-operator#486.
  serviceAudience: "https://auth.romaine.life"
  # Allowed (namespace, serviceAccount) callers for the service path.
  # - Tank-operator session pods run as `claude-session` in the
  #   `tank-operator-sessions` namespace (per-session lineage).
  # - mcp-* shared MCP servers each run as their own SA in their own
  #   namespace (pod-stable lineage — see NAMESPACE_TO_CONSUMER in
  #   src/service-exchange.ts).
  # - Hermes (`nelsong6/hermes`) is a singleton AI-agent StatefulSet
  #   that calls tank-operator's MCP servers from its own pod
  #   (pod-stable lineage — see nelsong6/tank-operator#540).
  # - Tank-operator's orchestrator (the long-lived Deployment in the
  #   `tank-operator` namespace, distinct from the session pods in
  #   `tank-operator-sessions`) calls Hermes' API server for hermes_gui
  #   session turns (pod-stable lineage; see nelsong6/tank-operator#540
  #   follow-up). Two distinct slugs (`tank` for sessions, `tank-operator`
  #   for the orchestrator) so a leaked session JWT and a leaked
  #   orchestrator JWT live in different reserved synthetic-email
  #   subdomains and can't be swapped for each other downstream.
  # - Tank-operator native test-slot orchestrators run as
  #   `tank-operator-slot-N/tank-operator-slot-N`. They need the same
  #   actor_email override for testable repo discovery, but auth maps them
  #   to slot-specific synthetic service users for audit separation.
  # - Tank-operator native test-slot session pods run as
  #   `tank-operator-slot-N-sessions/tank-operator-slot-N-session`. They
  #   use the per-session `tank` consumer with slot-prefixed synthetic ids
  #   so slot-local session ids cannot collide with prod session ids.
  # - Glimmung's orchestrator runs as `glimmung/infra-shared` and uses a
  #   pod-stable service identity for lifecycle cleanup callbacks when no
  #   human request token is present.
  serviceSaAllowlist: >-
    tank-operator-sessions/claude-session,
    mcp-k8s/mcp-k8s,
    mcp-argocd/mcp-argocd,
    mcp-azure-personal/mcp-azure-personal,
    hermes/hermes,
    glimmung/infra-shared,
    tank-operator/tank-operator,
    tank-operator-slot-1/tank-operator-slot-1,
    tank-operator-slot-2/tank-operator-slot-2,
    tank-operator-slot-3/tank-operator-slot-3,
    tank-operator-slot-4/tank-operator-slot-4,
    tank-operator-slot-5/tank-operator-slot-5,
    tank-operator-slot-6/tank-operator-slot-6,
    tank-operator-slot-7/tank-operator-slot-7,
    tank-operator-slot-8/tank-operator-slot-8,
    tank-operator-slot-9/tank-operator-slot-9,
    tank-operator-slot-10/tank-operator-slot-10,
    tank-operator-slot-1-sessions/tank-operator-slot-1-session,
    tank-operator-slot-2-sessions/tank-operator-slot-2-session,
    tank-operator-slot-3-sessions/tank-operator-slot-3-session,
    tank-operator-slot-4-sessions/tank-operator-slot-4-session,
    tank-operator-slot-5-sessions/tank-operator-slot-5-session,
    tank-operator-slot-6-sessions/tank-operator-slot-6-session,
    tank-operator-slot-7-sessions/tank-operator-slot-7-session,
    tank-operator-slot-8-sessions/tank-operator-slot-8-session,
    tank-operator-slot-9-sessions/tank-operator-slot-9-session,
    tank-operator-slot-10-sessions/tank-operator-slot-10-session
  # External-audience federation exchange (/api/auth/exchange/federation).
  # Workloads present their projected SA token here and receive an
  # auth.romaine.life-signed JWT scoped to a specific external audience
  # (today: Tailscale's tailnet identifier). Discovery for the external
  # IdP is served at the ROOT (/.well-known/openid-configuration) so a
  # third-party verifier finds /api/auth/jwks via standard discovery.
  #
  # Distinct from the service-exchange allowlist: trust to act as a
  # service principal inside romaine.life is NOT the same trust
  # decision as trust to assert identity to an external IdP.
  federationAudience: "https://auth.romaine.life"
  # Allowed (namespace, serviceAccount) callers for the federation path.
  # Glimmung's main pod (`glimmung/infra-shared`) is the first concrete
  # consumer — the lease-callback handler runs there, NOT in the
  # per-run native-runner pod, and that handler dials Tailscale's
  # /oauth/token with our JWT as `client_assertion` per RFC 7523.
  # Other workloads need an explicit add here AND a matching audience
  # in `federationAudienceAllowlist`.
  #
  # tank-operator-sessions/claude-session is added so an operator session
  # pod can mint a tag:spirelens-orchestrator auth key via the same
  # federation flow glimmung uses, to exercise tailnet reachability when
  # diagnosing the spirelens env-prep SSH path.
  federationSaAllowlist: "glimmung/infra-shared, tank-operator-sessions/claude-session"
  # Comma-separated audience patterns. Trailing `*` is a suffix wildcard
  # (e.g. "api.tailscale.com/*" matches the specific Tailscale tailnet
  # identifier). Empty allowlist refuses everything — the route is
  # effectively disabled until at least one entry lands here.
  #
  # Tailscale's "Trust credentials" OIDC trust binding for the
  # romaine.life tailnet is api.tailscale.com/T6vFBk1dAa11CNTRL-kf6kJRvG5T11CNTRL;
  # the wildcard tolerates Tailscale-side rotation of that suffix.
  federationAudienceAllowlist: "api.tailscale.com/*"
  # Namespaces hosting service-principal consumer pods — the auth pod
  # gets a cross-namespace Role + RoleBinding for `pods get` in each so
  # /api/auth/exchange/k8s can read pod metadata at exchange time.
  # Per-session consumers also need lineage annotations
  # (tank-operator/owner-email, tank-operator/session-id) on their
  # pods; pod-stable consumers (shared MCP servers and tank-operator
  # test-slot orchestrators) do not. Add a namespace here only when the
  # consumer reads pod annotations, and add a matching route in
  # src/service-consumers.ts.
  serviceConsumerNamespaces:
    - tank-operator-sessions
    - mcp-k8s
    - mcp-argocd
    - mcp-azure-personal
    - hermes
    - tank-operator
    - tank-operator-slot-1-sessions
    - tank-operator-slot-2-sessions
    - tank-operator-slot-3-sessions
    - tank-operator-slot-4-sessions
    - tank-operator-slot-5-sessions
    - tank-operator-slot-6-sessions
    - tank-operator-slot-7-sessions
    - tank-operator-slot-8-sessions
    - tank-operator-slot-9-sessions
    - tank-operator-slot-10-sessions
