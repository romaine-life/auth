# The image tag is bumped by .github/workflows/build-and-deploy.yaml on every
# push to main (via `sed` on this file). Everything else is wired through
# templates/.
image:
  repository: romainecr.azurecr.io/auth
  tag: 071b5c1

# Wildcard cert + XListenerSet covering auth.dev.romaine.life AND
# *.auth.dev.romaine.life. Provisioned once by the prod chart so
# per-slot helm releases (k8s/issue/) can attach their HTTPRoutes to
# this listener instead of each provisioning their own cert + listener.
# Mirrors glimmung's wildcard cert pattern.
wildcardCertificate:
  enabled: true
  name: auth-wildcard
  tlsSecret: auth-wildcard-tls
  issuer: letsencrypt-prod-dns01
  allowedFromNamespaces: All
  hosts:
    - auth.dev.romaine.life
    - "*.auth.dev.romaine.life"

# auth-db backup destination. storageAccount is provisioned by
# tofu/backups.tf and named `authdbbackups<random>`; on first tofu
# apply, copy the value of `terraform output auth_db_backups_storage_account`
# into the field below. container is fixed by tofu and matches.
#
# Empty storageAccount short-circuits the CNPG backup config to a
# render-error (no destinationPath), which is the right failure mode
# while tofu is being applied for the first time — better than a
# silently-misconfigured Cluster that thinks it's backing up but isn't.
backups:
  # Provisioned by tofu/backups.tf — `authdbbackups<random>`. Update
  # this whenever tofu replaces the storage account (rare; happens on
  # delete/re-import only).
  storageAccount: "authdbbackupspjbrsd"
  container: "auth-db"
  # Workload-identity client ID for the auth-db-backup-writer UAMI
  # provisioned in tofu/workload-identity.tf. Copy from
  # `terraform output auth_db_backup_writer_client_id` after the tofu
  # apply that creates the UAMI. The chart's cluster.yaml uses this on
  # the SA annotation azure.workload.identity/client-id; CNPG's
  # inheritFromAzureAD path then picks up the projected token at
  # /var/run/secrets/azure/tokens/azure-identity-token.
  workloadIdentityClientId: "4d3946f7-3845-4cb4-84f7-f6210dda6f01"
